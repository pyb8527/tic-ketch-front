<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicKetch — 실시간 좌석 예매</title>
    <meta name="description" content="콘서트·공연 좌석을 실시간으로 예매하는 가장 빠른 길, TicKetch" />
    <meta name="theme-color" content="#4F46E5" />

    <!-- Theme init (FOUC 방지): paint 이전에 .dark 클래스 결정 -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('ticketch-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

    <!-- Fonts: Pretendard(본문/한글) · Sora(디스플레이) · JetBrains Mono(숫자) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
